<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Inna Notes</title>
</head>
<body>

<div id="login">
  <h2>登录 Inna Notes</h2>

  <input
    id="email"
    type="email"
    placeholder="邮箱"
  >

  <br><br>

  <input
    id="password"
    type="password"
    placeholder="密码"
  >

  <br><br>

  <button onclick="login()">
    登录
  </button>

  <p id="message"></p>
</div>

<div id="content" style="display:none">
  <h1>欢迎来到 Inna Notes</h1>
  <h2>工作区</h2>

  <textarea
    id="note"
    rows="20"
    cols="80">
  </textarea>

  <br><br>

  <button onclick="saveNote()">
  保存
  </button>

  <button onclick="logout()">
    退出登录
  </button>
</div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl =
'https://uvvgafdlkrwluuseqvef.supabase.co'

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2dmdhZmRsa3J3bHV1c2VxdmVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1Njk4ODEsImV4cCI6MjA5OTE0NTg4MX0.Q21EsLeel2nIsrxUQpe9_ZDwkvhXId9_FDTAQzXjGkE'

const supabase =
createClient(
  supabaseUrl,
  supabaseKey
)

//读取函数
async function loadNote() {
  const { data, error } = await supabase
    .from('notes')
    .select('*')
    .eq('title', 'Work')
    .single();
  if (error) {
    console.log(error);
  } else {
    document.getElementById('note').value =
      data.content || '';
  }
}
  
async function checkSession() {
  const {
    data
  } =
  await supabase.auth.getSession()
if(data.session){
    document.getElementById("login")
      .style.display = "none";
    document.getElementById("content")
      .style.display = "block";
    await loadNote();
}
}

window.login = async function(){

  const email =
    document.getElementById("email").value

  const password =
    document.getElementById("password").value

  const { error } =
    await supabase.auth.signInWithPassword({

      email,
      password

    })

  if(error){

    document.getElementById("message")
      .innerText = error.message

  }else{

    location.reload()

  }

}

window.logout = async function(){

  await supabase.auth.signOut()

  location.reload()

}

checkSession()

</script>

</body>
</html>
